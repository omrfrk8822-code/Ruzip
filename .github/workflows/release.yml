name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (örn. v0.1.0)'
        required: false
        default: 'v0.1.0'
        type: string
  push:
    tags:
      - 'v*'

env:
  TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install

      - name: Build (Windows x64)
        run: npm run tauri build

      - name: Install Inno Setup
        run: |
          iwr -useb 'https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe' -OutFile "$env:TEMP\innosetup.exe"
          Start-Process -Wait "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=""C:\Program Files (x86)\Inno Setup 6"""
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Inno Setup installer
        run: ISCC.exe installer\ruzip_setup.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            release/RuZip_Setup_*.exe
            src-tauri/target/release/RuZip.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm install

      - name: Build (Linux x64)
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-assets
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-apple-darwin

      - name: Install dependencies
        run: npm install

      - name: Build (macOS x64)
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: src-tauri/target/release/bundle/dmg/*.dmg

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-assets
          path: assets/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-assets
          path: assets/linux

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-assets
          path: assets/macos

      - name: Create Release & Upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ env.TAG }}" --title "RuZip ${{ env.TAG }}" --notes "" 2>/dev/null || true
          gh release view "${{ env.TAG }}" --json assets --jq '.assets[].name' 2>/dev/null | while read -r name; do echo "Deleting old: $name"; gh release delete-asset "${{ env.TAG }}" "$name" --yes; done || true
          find assets -type f | while read -r f; do
            echo "Uploading $f..."
            gh release upload "${{ env.TAG }}" "$f"
          done