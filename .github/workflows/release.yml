name: Release

on:
  # Manuel tetikleme: Actions -> Run workflow -> tag gir (örn. v0.1.3)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (örn. v0.1.4)'
        required: true
        default: 'v0.1.4'
        type: string
  # Gelecekte tag push ile otomatik tetikleme (ruleset izin verirse)
  push:
    tags:
      - 'v*'

# Tüm job'lar için yazma izni
permissions:
  contents: write

env:
  # workflow_dispatch ise inputs.tag, değilse push edilen tag
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install

      - name: Build (Tauri)
        run: npm run tauri build

      - name: Install Inno Setup
        run: |
          iwr -useb 'https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe' -OutFile "$env:TEMP\innosetup.exe"
          Start-Process -Wait "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=""C:\Program Files (x86)\Inno Setup 6"""
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Inno Setup installer
        run: ISCC.exe installer/ruzip_setup.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            release/RuZip_Setup_*.exe
            src-tauri/target/release/RuZip.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm install

      - name: Build (Tauri)
        run: npm run tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-apple-darwin

      - name: Install dependencies
        run: npm install

      - name: Build (Tauri)
        run: npm run tauri build

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    name: Create Release & Upload Assets
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded structure (debug)
        run: |
          echo "TAG=${{ env.TAG }}"
          ls -R artifacts

      - name: Remove existing release/tag if present (clean re-run)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ env.TAG }}" --yes 2>/dev/null || echo "no release to delete"
          gh api --method DELETE "/repos/${{ github.repository }}/git/refs/tags/${{ env.TAG }}" 2>/dev/null || echo "no tag ref to delete"

      - name: Create git tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "/repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/${{ env.TAG }}" \
            -f sha="${{ github.sha }}" 2>/dev/null || echo "tag may already exist"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: RuZip ${{ env.TAG }}
          generate_release_notes: true
          files: |
            artifacts/windows/**/*
            artifacts/linux/**/*
            artifacts/macos/**/*
          fail_on_unmatched_files: false
