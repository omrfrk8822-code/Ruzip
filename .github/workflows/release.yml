name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (örn. v0.1.0)'
        required: false
        default: 'v0.1.0'
        type: string
  push:
    tags:
      - 'v*'

env:
  TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install

      - name: Build (Windows x64)
        run: npm run tauri build

      - name: Install Inno Setup
        run: |
          iwr -useb 'https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe' -OutFile "$env:TEMP\innosetup.exe"
          Start-Process -Wait "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=""C:\Program Files (x86)\Inno Setup 6"""
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Inno Setup installer
        run: ISCC.exe installer\ruzip_setup.iss

      - name: Delete old Windows assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = gh release view $env:TAG --json assets --jq '.assets[].name' 2>$null
          if ($assets) { $assets | Select-String -Pattern '\.msi$|^RuZip\.exe$|^RuZip_Setup_' | ForEach-Object { Write-Host "Deleting $_..."; gh release delete-asset $env:TAG $_ --yes 2>$null } }

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            release/RuZip_Setup_*.exe
            src-tauri/target/release/RuZip.exe
          generate_release_notes: true
          fail_on_unmatched_files: false

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm install

      - name: Build (Linux x64)
        run: npm run tauri build

      - name: Delete old Linux assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$TAG" --json assets --jq '.assets[].name' | grep -E '\.(AppImage|deb)$' | while read -r asset; do echo "Deleting $asset..."; gh release delete-asset "$TAG" "$asset" --yes; done || true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          fail_on_unmatched_files: false

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-apple-darwin

      - name: Install dependencies
        run: npm install

      - name: Build (macOS x64)
        run: npm run tauri build

      - name: Delete old macOS assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$TAG" --json assets --jq '.assets[].name' | grep -E '\.dmg$' | while read -r asset; do echo "Deleting $asset..."; gh release delete-asset "$TAG" "$asset" --yes; done || true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: false
